<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="96" fill="#0f1923"/>

  <!-- Server rows -->
  <rect x="136" y="180" width="290" height="52" rx="7" fill="#2d2d4a" stroke="#4a4a6a" stroke-width="2"/>
  <rect x="136" y="242" width="290" height="52" rx="7" fill="#2d2d4a" stroke="#4a4a6a" stroke-width="2"/>
  <rect x="136" y="304" width="290" height="52" rx="7" fill="#2d2d4a" stroke="#4a4a6a" stroke-width="2"/>
  <rect x="136" y="366" width="290" height="52" rx="7" fill="#2d2d4a" stroke="#4a4a6a" stroke-width="2"/>

  <!-- Status lights -->
  <circle cx="163" cy="206" r="7" fill="#4ade80"/>
  <circle cx="163" cy="268" r="7" fill="#4ade80"/>
  <circle cx="163" cy="330" r="7" fill="#2d4a3e"/>
  <circle cx="163" cy="392" r="7" fill="#4ade80"/>

  <!-- Slot lines -->
  <rect x="188" y="198" width="90" height="5" rx="2.5" fill="#3a3a5a"/>
  <rect x="188" y="210" width="60" height="5" rx="2.5" fill="#3a3a5a"/>
  <rect x="188" y="260" width="90" height="5" rx="2.5" fill="#3a3a5a"/>
  <rect x="188" y="272" width="60" height="5" rx="2.5" fill="#3a3a5a"/>
  <rect x="188" y="322" width="90" height="5" rx="2.5" fill="#2a2a3a"/>
  <rect x="188" y="334" width="60" height="5" rx="2.5" fill="#2a2a3a"/>
  <rect x="188" y="384" width="90" height="5" rx="2.5" fill="#3a3a5a"/>
  <rect x="188" y="396" width="60" height="5" rx="2.5" fill="#3a3a5a"/>

  <!-- Docker-style stacked tiles (top right of first server) -->
  <rect x="340" y="188" width="30" height="16" rx="2.5" fill="#4ade80" opacity="0.3"/>
  <rect x="340" y="207" width="30" height="16" rx="2.5" fill="#4ade80" opacity="0.6"/>
  <rect x="374" y="188" width="30" height="16" rx="2.5" fill="#4ade80" opacity="0.6"/>
  <rect x="374" y="207" width="30" height="16" rx="2.5" fill="#4ade80" opacity="0.9"/>

  <!-- Up arrow -->
  <line x1="256" y1="170" x2="256" y2="80" stroke="#4ade80" stroke-width="18" stroke-linecap="round"/>
  <polyline points="214,122 256,72 298,122" fill="none" stroke="#4ade80" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
