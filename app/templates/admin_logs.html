<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs — Keepup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>body { background-color: #0d1117; }</style>
</head>
<body class="min-h-full text-slate-200 font-sans flex flex-col h-screen">

  <!-- Header -->
  <div class="flex flex-wrap items-start justify-between gap-3 px-4 md:px-6 py-4 border-b border-slate-700/60 shrink-0">
    <div>
      <h1 class="text-xl font-bold text-white">Logs</h1>
      <p class="text-xs text-slate-500 mt-0.5">Live application log — last 200 lines, refreshes every 3 s</p>
    </div>
    <div class="flex items-center gap-2">
      <a href="/admin"
        class="px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-medium text-slate-300 transition-colors">
        Admin
      </a>
      <a href="/dashboard"
        class="px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-medium text-slate-300 transition-colors">
        Dashboard
      </a>
    </div>
  </div>

  <!-- Log container -->
  <div id="log-container"
    class="flex-1 overflow-y-auto bg-slate-900/60 border-b border-slate-700/40"
    style="scroll-behavior: smooth;">

    <div class="py-2">
      {% include "partials/admin_log_lines.html" %}
    </div>
  </div>

  <script>
    // Scroll to bottom on initial load
    const container = document.getElementById('log-container');
    container.scrollTop = container.scrollHeight;

    // After each HTMX swap, scroll to bottom if already near bottom
    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target && e.detail.target.id === 'log-lines') {
        const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
        if (atBottom) container.scrollTop = container.scrollHeight;
      }
    });
  </script>

</body>
</html>
