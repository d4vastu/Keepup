<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/icon-192.svg" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs — Keepup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>body { background-color: #0d1117; }</style>
</head>
<body class="min-h-full text-slate-200 font-sans flex flex-col h-screen">

  <!-- Top bar -->
  <div class="flex flex-wrap items-center justify-between gap-2 px-4 md:px-5 py-2.5 border-b border-[#21262d] bg-[#0d1117] shrink-0">
    <div class="flex items-center gap-2.5">
      <a href="/home" class="flex items-center gap-1.5 text-[12px] font-medium px-3 py-1.5 rounded-md bg-[#0a1f10] border border-[#2d4a3e] text-[#3fb950] flex-shrink-0">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 6.5L8 2l6 4.5V14a.5.5 0 01-.5.5h-4V10h-3v4.5h-4A.5.5 0 012 14V6.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        Home
      </a>
      <div class="w-px h-[18px] bg-[#21262d] flex-shrink-0"></div>
      <div class="flex items-center gap-2">
        <img src="/static/logo.svg" alt="Keepup" class="w-7 h-7 rounded-lg flex-shrink-0" />
        <span class="text-[14px] font-medium tracking-tight text-slate-100">keep<span class="text-[#3fb950]">up</span></span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[12px] text-slate-500 px-2">Logs — last 200 lines · refreshes every 3 s</span>
      <a href="/admin" class="text-[12px] font-medium px-3 py-1.5 rounded-md border border-[#30363d] bg-transparent text-slate-400 hover:bg-[#161b22] hover:text-slate-100 transition-colors">Admin</a>
    </div>
  </div>

  <!-- Log container -->
  <div id="log-container"
    class="flex-1 overflow-y-auto bg-slate-900/60 border-b border-slate-700/40"
    style="scroll-behavior: smooth;">

    <div class="py-2">
      {% include "partials/admin_log_lines.html" %}
    </div>
  </div>

  <script>
    // Scroll to bottom on initial load
    const container = document.getElementById('log-container');
    container.scrollTop = container.scrollHeight;

    // After each HTMX swap, scroll to bottom if already near bottom
    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target && e.detail.target.id === 'log-lines') {
        const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
        if (atBottom) container.scrollTop = container.scrollHeight;
      }
    });
  </script>

</body>
</html>
